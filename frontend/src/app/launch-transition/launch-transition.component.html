<div class="launch-screen" [class.fade-out]="isFadingOut">

  <!-- Subtle background grid -->
  <div class="launch-bg"></div>

  <!-- Main container -->
  <div class="launch-container">

    <!-- Brand -->
    <div class="launch-brand">
      <div class="launch-logo">
        <span>{{ shipIcon }}</span>
      </div>
      <div class="launch-label">Dtyle.AI Maritime</div>
    </div>

    <!-- Vessel info -->
    <div class="launch-vessel">
      <h2 class="launch-vessel-name">{{ shipName }}</h2>
      <p class="launch-vessel-subtitle">Establishing secure connection</p>
    </div>

    <!-- Status section -->
    <div class="launch-status">

      <!-- Progress bar -->
      <div class="launch-progress">
        <div class="progress-header">
          <span class="progress-label">Connection Progress</span>
          <span class="progress-value">{{ progress }}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" [style.width.%]="progress"></div>
        </div>
      </div>

      <!-- Status messages -->
      <div class="launch-messages">
        <div *ngFor="let msg of messages; let i = index"
             class="status-message"
             [class.active]="msg.status === 'active'"
             [class.complete]="msg.status === 'complete'">
          <mat-icon class="message-icon">
            {{ msg.status === 'active' ? 'sync' : 'check_circle' }}
          </mat-icon>
          <span class="message-text">{{ msg.text }}</span>
          <mat-icon class="message-check">check_circle</mat-icon>
        </div>
      </div>

    </div>

    <!-- Security footer -->
    <div class="launch-footer">
      <mat-icon class="footer-icon">lock</mat-icon>
      <span>AES-256 Encrypted Channel</span>
    </div>

  </div>

</div>
