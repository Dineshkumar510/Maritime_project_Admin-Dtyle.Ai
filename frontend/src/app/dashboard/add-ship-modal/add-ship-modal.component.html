<div class="dtl-modal">

  <!-- ── Header ── -->
  <div class="dtl-header">
    <div class="dtl-header__left">
      <div>
        <h2 class="dtl-header__title">{{ title }}</h2>
        <p class="dtl-header__sub">Maritime Fleet Registry</p>
      </div>
    </div>
    <button class="dtl-close" (click)="cancel()" type="button">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- ── Form ── -->
  <form [formGroup]="form" (ngSubmit)="submit()" class="dtl-form">

    <!-- ─ Vessel Name ─ -->
    <div class="dtl-field">
      <label class="dtl-label">
        <mat-icon class="dtl-label__icon">directions_boat</mat-icon>
        Vessel Name <span class="req">*</span>
      </label>
      <input
        class="dtl-input"
        formControlName="name"
        placeholder="e.g. MV Pacific Voyager"
        autocomplete="off"
      />
      <div class="dtl-error" *ngIf="form.get('name')?.touched && form.get('name')?.hasError('required')">
        Vessel name is required
      </div>
    </div>

    <!-- ─ Dashboard URL — encrypted display ─ -->
    <div class="dtl-field">
      <label class="dtl-label">
        <mat-icon class="dtl-label__icon">link</mat-icon>
        Dashboard URL <span class="req">*</span>
      </label>

      <div class="dtl-url-wrapper">
        <!-- Prefix icon: lock when encrypted, lock_open when editing -->
        <mat-icon class="dtl-url-icon" [class.dtl-url-icon--locked]="!urlFocused() && urlHasValue()" [class.dtl-url-icon--open]="urlFocused()">
          {{ urlFocused() ? 'lock_open' : (urlHasValue() ? 'lock' : 'link') }}
        </mat-icon>

        <input
          #urlInputRef
          class="dtl-input dtl-input--url"
          [class.dtl-input--encrypted]="!urlFocused() && urlHasValue()"
          [class.dtl-input--editing]="urlFocused()"
          (focus)="onUrlFocus()"
          (blur)="onUrlBlur($event)"
          (input)="onUrlInput($event)"
          placeholder="https://vessel-dashboard.example.com"
          autocomplete="off"
          spellcheck="false"
          type="text"
        />

      </div>


      <div class="dtl-error"
           *ngIf="form.get('redirect_url')?.touched && form.get('redirect_url')?.hasError('required')">
        Dashboard URL is required
      </div>
    </div>

    <!-- ─ Description ─ -->
    <div class="dtl-field">
      <label class="dtl-label">
        <mat-icon class="dtl-label__icon">description</mat-icon>
        Description
      </label>
      <textarea
        class="dtl-input dtl-textarea"
        formControlName="description"
        rows="2"
        placeholder="Brief description of this vessel…"
      ></textarea>
    </div>

    <!-- ─ Status ─ -->
    <div class="dtl-field">
      <label class="dtl-label">
        <mat-icon class="dtl-label__icon">flag</mat-icon>
        Operational Status <span class="req">*</span>
      </label>
      <div class="dtl-status-group">
        <label
          class="dtl-status-option dtl-status-option--active"
          [class.selected]="form.get('status')?.value === 'active'"
        >
          <input type="radio" formControlName="status" value="active" hidden />
          <span class="status-dot"></span>
          <span>Active</span>
        </label>
        <label
          class="dtl-status-option dtl-status-option--maintenance"
          [class.selected]="form.get('status')?.value === 'maintenance'"
        >
          <input type="radio" formControlName="status" value="maintenance" hidden />
          <span class="status-dot"></span>
          <span>Maintenance</span>
        </label>
        <label
          class="dtl-status-option dtl-status-option--inactive"
          [class.selected]="form.get('status')?.value === 'inactive'"
        >
          <input type="radio" formControlName="status" value="inactive" hidden />
          <span class="status-dot"></span>
          <span>Inactive</span>
        </label>
      </div>
    </div>

    <!-- ─ Ship Image ─ -->
    <div class="dtl-field">
      <label class="dtl-label">
        <mat-icon class="dtl-label__icon">image</mat-icon>
        Vessel Image
      </label>

      <div class="dtl-img-preview" *ngIf="imagePreview()">
        <img [src]="imagePreview()" alt="Preview" />
        <button type="button" class="dtl-img-clear" (click)="clearImage()">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="dtl-upload" *ngIf="!imagePreview()">
        <input type="file" accept="image/*" (change)="onFileSelected($event)" #fileInput hidden />
        <button type="button" class="dtl-upload__btn" (click)="fileInput.click()">
          <mat-icon>cloud_upload</mat-icon>
          <span>Click to upload image</span>
        </button>
        <div class="dtl-upload__divider">
          <span>or paste URL below</span>
        </div>
        <input
          class="dtl-input"
          formControlName="image_url"
          placeholder="https://example.com/vessel.jpg"
          (input)="imagePreview.set($any($event.target).value)"
          type="url"
        />
      </div>
    </div>

    <!-- ─ Error ─ -->
    <div class="dtl-form-error" *ngIf="error()">
      <mat-icon>error_outline</mat-icon>
      <span>{{ error() }}</span>
    </div>

    <!-- ─ Actions ─ -->
    <div class="dtl-actions">
      <button type="button" class="dtl-btn dtl-btn--cancel" (click)="cancel()" [disabled]="loading()">
        Cancel
      </button>
      <button type="submit" class="dtl-btn dtl-btn--submit" [disabled]="form.invalid || loading()">
        <mat-spinner *ngIf="loading()" diameter="18"></mat-spinner>
        <mat-icon *ngIf="!loading()">{{ isEditMode ? 'save' : 'add_circle' }}</mat-icon>
        <span>{{ submitLabel }}</span>
      </button>
    </div>

  </form>
</div>
