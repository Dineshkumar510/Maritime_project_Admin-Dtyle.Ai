<div class="modal-container">
  <div class="modal-header">
    <h2>{{ title }}</h2>
    <button mat-icon-button (click)="cancel()" class="close-btn">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="modal-form">
    <!-- Ship Name -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Ship Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter ship name" />
      <mat-icon matPrefix>directions_boat</mat-icon>
      <mat-error *ngIf="form.get('name')?.hasError('required')">
        Ship name is required
      </mat-error>
    </mat-form-field>

    <!-- Redirect URL -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Dashboard URL</mat-label>
      <input
        matInput
        formControlName="redirect_url"
        placeholder="https://ship-dashboard.example.com"
      />
      <mat-icon matPrefix>link</mat-icon>
      <mat-error *ngIf="form.get('redirect_url')?.hasError('required')">
        Dashboard URL is required
      </mat-error>
    </mat-form-field>

    <!-- Description -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea
        matInput
        formControlName="description"
        rows="3"
        placeholder="Brief description of the ship"
      ></textarea>
      <mat-icon matPrefix>description</mat-icon>
    </mat-form-field>

    <!-- Status -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option value="active">Active</mat-option>
        <mat-option value="maintenance">Maintenance</mat-option>
        <mat-option value="inactive">Inactive</mat-option>
      </mat-select>
      <mat-icon matPrefix>flag</mat-icon>
    </mat-form-field>

    <!-- Image Upload or URL -->
    <div class="image-section">
      <h3>Ship Image</h3>

      <!-- Image Preview -->
      <div class="image-preview" *ngIf="imagePreview()">
        <img [src]="imagePreview()" alt="Preview" />
        <button
          type="button"
          mat-icon-button
          class="clear-image-btn"
          (click)="clearImage()"
        >
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <!-- Upload Button -->
      <div class="upload-area" *ngIf="!imagePreview()">
        <input
          type="file"
          accept="image/*"
          (change)="onFileSelected($event)"
          #fileInput
          hidden
        />
        <button
          type="button"
          mat-stroked-button
          (click)="fileInput.click()"
          class="upload-btn"
        >
          <mat-icon>cloud_upload</mat-icon>
          Upload Image
        </button>
        <span class="or-text">or</span>
        <mat-form-field appearance="outline" class="image-url-field">
          <mat-label>Image URL</mat-label>
          <input
            matInput
            formControlName="image_url"
            placeholder="https://example.com/ship.jpg"
            (input)="imagePreview.set($any($event.target).value)"
          />
          <mat-icon matPrefix>image</mat-icon>
        </mat-form-field>
      </div>
    </div>

    <!-- Error Message -->
    <div class="error-message" *ngIf="error()">
      <mat-icon>error</mat-icon>
      <span>{{ error() }}</span>
    </div>

    <!-- Actions -->
    <div class="modal-actions">
      <button
        type="button"
        mat-stroked-button
        (click)="cancel()"
        [disabled]="loading()"
      >
        Cancel
      </button>
      <button
        type="submit"
        mat-flat-button
        color="primary"
        [disabled]="form.invalid || loading()"
        class="submit-btn"
      >
        <mat-spinner *ngIf="loading()" diameter="20"></mat-spinner>
        <span *ngIf="!loading()">{{ submitLabel }}</span>
      </button>
    </div>
  </form>
</div>
